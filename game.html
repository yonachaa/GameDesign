<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONO Game - Presidential Pledges</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <audio id="bgm-plaza" src="https://res.cloudinary.com/dq40bwfal/video/upload/v1776068545/%EC%98%A4%ED%94%84%EB%8B%9D_mobbdu.mp3" loop></audio>
    <audio id="bgm-dialog" src="https://res.cloudinary.com/dq40bwfal/video/upload/v1776068550/%EA%B4%91%EC%9E%A5_vhoeql.mp3" loop></audio>
    <audio id="bgm-minigame" src="https://res.cloudinary.com/dq40bwfal/video/upload/v1776068552/%EA%B2%8C%EC%9E%84_u8f8xh.mp3" loop></audio>
    <audio id="bgm-reward" src="https://res.cloudinary.com/dq40bwfal/video/upload/v1776068554/%EB%A6%AC%EC%9B%8C%EB%93%9C_neoc8t.mp3"></audio>

    <div id="game-screen">
        <div id="title-scene">
            <video id="bg-video" src="https://res.cloudinary.com/dq40bwfal/video/upload/v1775454091/%EC%9D%B4%EB%AF%B8%EC%A7%80_%EB%B9%84%EB%94%94%EC%98%A4_%EB%B3%80%ED%99%98_%EC%9A%94%EC%B2%AD_dx4zwm.mp4" autoplay loop muted playsinline></video>
            <div id="title-ui">
                <img id="title-logo" src="https://res.cloudinary.com/dq40bwfal/image/upload/v1775454619/Gemini_Generated_Image_4nuoe74nuoe74nuo-removebg-preview_wwtgch.png" alt="MONO Logo">
                <img id="start-btn" src="https://res.cloudinary.com/dq40bwfal/image/upload/v1775454648/Button_rxzcjp.png" alt="Start Button">
            </div>
        </div>

        <div id="scene-container">
            <img id="bg-next" src="https://res.cloudinary.com/dq40bwfal/image/upload/v1775454885/Gemini_Generated_Image_1b37oe1b37oe1b37_yqrrej.jpg" alt="Lawn Background">
            <div id="character-layer"></div>
        </div>

        <div id="global-back-btn">◀ BACK</div>

        <div id="dialog-layer" class="dialog-system">
            <img class="dialog-bubble-bg" src="https://res.cloudinary.com/dq40bwfal/image/upload/v1776042004/Group_298_lrncoo.png" alt="말풍선">
            <img id="tiger-char" src="https://res.cloudinary.com/dq40bwfal/image/upload/v1775501306/%ED%98%B8%EB%9E%91%EC%9D%B42_po9zio.png" alt="호랑이">
            <div class="dialog-content-area tiger-content-area">
                <div id="arrow-left" class="nav-arrow nav-left hidden">◀</div>
                <div class="text-container">
                    <div id="dialog-text" class="dyslexia-text"></div>
                </div>
                <div id="arrow-right" class="nav-arrow nav-right">▶</div>
            </div>
            <button id="main-start-btn" class="pixel-button action-button start-button-pixel" style="display: none;">START</button>
            <div id="quiz-btn-container" style="display: none;">
                <button id="quiz-btn-a" class="pixel-button quiz-button">A. Doctor Shortage</button>
                <button id="quiz-btn-b" class="pixel-button quiz-button">B. Free Housing</button>
            </div>
            <button id="minigame-start-btn" class="pixel-button action-button start-button-pixel" style="display: none;">START MINIGAME</button>
        </div>

        <div id="info-dialog-layer" class="dialog-system">
            <div class="info-bubble-container">
                <img class="dialog-bubble-bg" src="https://res.cloudinary.com/dq40bwfal/image/upload/v1776042004/Group_298_lrncoo.png" alt="정보 말풍선">
                <div class="dialog-content-wrapper">
                    <div class="profile-section">
                        <div class="portrait-box">
                            <img id="info-portrait-img" src="https://res.cloudinary.com/dq40bwfal/image/upload/v1775282552/%EA%B0%84%ED%98%B8%EC%82%AC_ww0zqk.png" alt="초상화">
                        </div>
                        <div class="character-name" id="info-character-name">Nurse</div>
                    </div>
                    <div class="text-section">
                        <h2 class="topic-title" id="info-topic-title">Public Health</h2>
                        <div class="dialog-content-area info-content-area">
                            <div id="info-arrow-left" class="nav-arrow nav-left hidden">◀</div>
                            <div class="text-container">
                                <div id="info-dialog-text" class="dyslexia-text">text here</div>
                            </div>
                            <div id="info-arrow-right" class="nav-arrow nav-right">▶</div>
                        </div>
                    </div>
                </div>
                <div id="compare-btn" class="pixel-button action-button hidden">Compare Pledges</div>
            </div>
        </div>

        <div id="candidate-dialog-layer" class="dialog-system">
            <div class="info-bubble-container">
                <img class="dialog-bubble-bg" src="https://res.cloudinary.com/dq40bwfal/image/upload/v1776042004/Group_298_lrncoo.png" alt="대통령 대화창 배경">
                <div class="dialog-content-wrapper">
                    <div class="profile-section candidate-profile">
                        <div class="portrait-box candidate-portrait">
                            <img id="candidate-portrait-img" src="" alt="대통령 초상화">
                        </div>
                        <div class="character-name" id="candidate-character-name"></div>
                    </div>
                    <div class="text-section candidate-text">
                        <h2 class="topic-title">Public Health</h2>
                        <div class="dialog-content-area candidate-content-area">
                            <div id="candidate-arrow-left" class="nav-arrow nav-left hidden">◀</div>
                            <div class="text-container">
                                <div id="candidate-dialog-text" class="dyslexia-text">text here</div>
                            </div>
                            <div id="candidate-arrow-right" class="nav-arrow nav-right">▶</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="scene-image-layer">
            <img id="active-scene-image" src="" alt="Scene Image">
        </div>

        <div id="minigame-layer" class="minigame-layer-system">
            <div class="minigame-bubble-container">
                <button id="minigame-close-btn" class="minigame-close-btn">X</button>
                <div id="minigame-game-area" class="minigame-game-area triage-game">
                    <img src="https://res.cloudinary.com/dq40bwfal/image/upload/v1776064776/%ED%8A%B8%EB%A6%AC%EC%95%84%EC%A7%80_zfoclq.png" alt="Triage Title" class="triage-title-img">
                    <div class="doors-container">
                        <img src="https://res.cloudinary.com/dq40bwfal/image/upload/v1776064778/game_doors_jqmypp.png" alt="Triage Doors" class="triage-doors-bg">
                        <div id="zone-red" class="drop-zone red-zone" data-triage="red"></div>
                        <div id="zone-yellow" class="drop-zone yellow-zone" data-triage="yellow"></div>
                        <div id="zone-green" class="drop-zone green-zone" data-triage="green"></div>
                    </div>
                    <img src="https://res.cloudinary.com/dq40bwfal/image/upload/v1776065921/%EA%B2%8C%EC%9E%84_%EC%9D%98%EC%82%AC_tdwvzc.png" alt="Game Doctor" class="game-doctor">

                    <img id="patient-stretcher" src="https://res.cloudinary.com/dq40bwfal/image/upload/v1776065923/%EC%8B%A4%EB%A0%A4%EC%98%A8%EB%82%A8_pcvwsz.png" alt="실려온남" class="draggable-patient" draggable="false" data-correct-zone="red">
                    <img id="patient-bandage" src="https://res.cloudinary.com/dq40bwfal/image/upload/v1776065925/%EB%B6%95%EB%8C%80%EB%82%A8_fidehg.png" alt="붕대남" class="draggable-patient" draggable="false" data-correct-zone="yellow">
                    <img id="patient-bboy" src="https://res.cloudinary.com/dq40bwfal/image/upload/v1776065926/%EB%B9%84%EB%B3%B4%EC%9D%B4%EB%82%A8_vccc2z.png" alt="비보이남" class="draggable-patient" draggable="false" data-correct-zone="green">

                    <div id="win-overlay" class="win-overlay hidden">
                        <img id="win-success-img" src="https://res.cloudinary.com/dq40bwfal/image/upload/v1776068156/%EC%84%B1%EA%B3%B5_cdymib.png" alt="성공">
                    </div>
                </div>
            </div>
        </div>

        <div id="unlocked-layer" class="dialog-system" style="display: none; z-index: 80;">
            <img class="dialog-bubble-bg" src="https://res.cloudinary.com/dq40bwfal/image/upload/v1776068411/%EB%A7%90%ED%92%8D%EC%84%A0%EB%B9%84%EC%9D%B5_sraxbx.png" alt="말풍선">
            <div class="unlocked-content">
                <img src="https://res.cloudinary.com/dq40bwfal/image/upload/v1776068158/%EC%96%B8%EB%9D%BD_mott3v.png" alt="Unlocked" class="unlocked-title">
                <div class="unlocked-info">
                    <span class="unlocked-hello">Hello</span>
                    <img src="https://res.cloudinary.com/dq40bwfal/image/upload/v1775282627/%EB%A1%9C%EB%B4%87_%ED%98%B8%EB%B2%84_q0ftm3.png" alt="로봇" class="unlocked-robot">
                    <span class="unlocked-role">AI - Science</span>
                </div>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
